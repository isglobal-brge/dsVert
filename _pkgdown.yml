url: https://isglobal-brge.github.io/dsVert/

template:
  bootstrap: 5
  bootswatch: flatly

footer:
  structure:
    left: built_with
    right: ~

navbar:
  structure:
    left: [intro, reference]
    right: [search, github]
  components:
    github:
      icon: fa-github
      href: https://github.com/isglobal-brge/dsVert
      aria-label: GitHub

home:
  title: dsVert
  description: DataSHIELD server-side functions for vertically partitioned data
  sidebar:
    structure: [links, authors, license]

# The dsVert reference index is intentionally not curated: the package
# exposes ~140 server-side `dsvert*DS` / `k2*DS` / `glmRing63*DS` /
# `psi*DS` aggregate / assign methods, and any analyst-relevant docs
# live on the client side (dsVertClient). pkgdown auto-discovers all
# exported topics under `Reference -> All functions`.

authors:
